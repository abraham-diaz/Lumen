services:
  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=lumen
      - POSTGRES_PASSWORD=lumen_password
      - POSTGRES_DB=lumen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=lumen
      - DB_USER=lumen
      - DB_PASSWORD=lumen_password
    volumes:
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
